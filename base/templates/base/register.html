{% extends "layout.html" %}

{% block title %}register{% endblock %}


{% block content %}
<form method="POST">

    {% for field in form %}

        {{field.label_tag}}

        {{field.errors}}
    <li>

    {% endfor %}

    <button type="submit">Register </button>

{% endblock %}
