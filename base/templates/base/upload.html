{% extends "layout.html" %}

{% block title %}upload{% endblock %}


{% block content %}
    <h2> Upload Image Section</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form  %}
            <div>
                {{field.label_tag}}
                {{field}}

                <div style="color:red;">{{errors}}</div>
            </div>
        {% endfor %}
        <button type="submit"> Upload </button>
        </form>
{% endblock %}
