{% extends "layout.html" %}

{% block title %}home{% endblock %}


{% block content %}
<form method="POST">
    {% csrf_token %}
    {% for field in form %}
    <p>{{field.label}}:
        {{field}}
        {{field.errors}}
    </p>
    {% endfor %}
    <a href="{% url "password_reset" %}"><small> forgot password? </small></a><br>
    <button type="submit"> Login </button>
    <a href="{% url "register" %}">register </a>
{% endblock %}
