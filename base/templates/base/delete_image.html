{% extends "layout.html" %}

{% block title %}Delete Image{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-danger">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                    </div>
                    <h3 class="card-title mb-2">Delete Image</h3>
                    <p class="text-muted mb-4">Are you sure you want to delete this image? This action cannot be undone.</p>
                    
                    <form method="POST" class="d-flex gap-2">
                        {% csrf_token %}
                        
                        <a href="{% url 'home' %}" class="btn btn-secondary flex-grow-1">Cancel</a>
                        <button type="submit" class="btn btn-danger flex-grow-1">Delete Image</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
