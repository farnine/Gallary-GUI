{% extends "layout.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-success">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <svg class="text-success" width="60" height="60" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
                        </svg>
                    </div>
                    <h2 class="card-title mb-3">Password Reset Successful</h2>
                    <p class="text-muted mb-4">Your password has been set successfully. You may now log in with your new password.</p>
                    
                    <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">Go to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
